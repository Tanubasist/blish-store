<!DOCTYPE html>
{% load static %}
<html>

<head>
    <title>Blish - Minimalist Store</title>
    <style>
        /* Ultra-Minimalist Global Look */
        body {
            background-color: #FAF9F6;
            color: #333333;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
        }

        /* Product Grid */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 50px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Flat Product Cards */
        .product-card {
            background: transparent;
            padding: 15px;
            text-align: center;
            border: 1px solid #EFEFEF;
            transition: border-color 0.3s ease;
        }

        .product-card:hover {
            border-color: #CCCCCC;
        }

        .product-card img {
            max-width: 100%;
            margin-bottom: 20px;
            filter: grayscale(15%);
            transition: filter 0.3s ease;
        }

        .product-card:hover img {
            filter: grayscale(0%);
        }

        .product-title {
            font-size: 1.1em;
            font-weight: 400;
            margin-bottom: 8px;
            color: #111111;
        }

        .product-price {
            color: #777777;
            font-size: 0.95em;
            margin-bottom: 25px;
        }

        /* Modest Outline Buttons */
        .btn {
            display: inline-block;
            background-color: transparent;
            color: #222222;
            padding: 10px 22px;
            text-decoration: none;
            border: 1px solid #222222;
            font-size: 0.85em;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #222222;
            color: #FAF9F6;
        }
    </style>
</head>

<body>

    <nav
        style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; margin-bottom: 50px; border-bottom: 1px solid #EFEFEF; flex-wrap: wrap; gap: 15px;">

        <div style="font-size: 1.4em; font-weight: 300; letter-spacing: 3px; color: #111;">
            <a href="{% url 'home' %}" style="text-decoration: none; color: inherit;">BLISH.</a>
        </div>

        <div style="font-size: 0.85em; text-transform: uppercase; letter-spacing: 1.5px;">
            <a href="{% url 'home' %}"
                style="color: #555; text-decoration: none; margin-right: 25px; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Store</a>

            <a href="{% url 'view_cart' %}"
                style="color: #555; text-decoration: none; margin-right: 25px; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Cart</a>

            {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}"
                style="color: #555; text-decoration: none; margin-right: 25px; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Dashboard</a>

            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit"
                    style="background: none; border: none; color: #555; font-family: inherit; font-size: 1em; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; padding: 0; transition: color 0.3s;"
                    onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" style="color: #555; text-decoration: none; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="product-grid">
        {% for product in products %}
        <div class="product-card">
            <a href="{% url 'product_detail' product.id %}">
                {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}">
                {% else %}
                <div style="width: 100%; height: 250px; background-color: #EFEFEF; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; color: #999;">
                    No Image
                </div>
                {% endif %}
            </a>
            <div class="product-title">{{ product.name }}</div>
            <div class="product-price">₹{{ product.price }}</div>
            <a href="{% url 'product_detail' product.id %}" class="btn">View Details</a>
        </div>
        {% endfor %}
    </div>

</body>

</html>
