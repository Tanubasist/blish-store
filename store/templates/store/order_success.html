<!DOCTYPE html>
<html>

<head>
    <title>Order Success - Blish</title>
    <style>
        /* Minimalist Global Look */
        body {
            background-color: #FAF9F6;
            color: #333333;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
        }

        /* Success Container */
        .success-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 50px 40px;
            border: 1px solid #EFEFEF;
            background: transparent;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 20px;
            color: #111;
            font-size: 2.5em;
            text-transform: uppercase;
        }

        p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* Outline Button */
        .btn-outline {
            display: inline-block;
            background-color: transparent;
            color: #111;
            padding: 15px 30px;
            text-decoration: none;
            border: 1px solid #111;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background-color: #111;
            color: #fff;
        }
    </style>
</head>

<body>

    <nav
        style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #EFEFEF; flex-wrap: wrap; gap: 15px; margin-bottom: 50px;">
        <div style="font-size: 1.4em; font-weight: 300; letter-spacing: 3px; color: #111;">
            <a href="{% url 'home' %}" style="text-decoration: none; color: inherit;">BLISH.</a>
        </div>

        <div style="font-size: 0.85em; text-transform: uppercase; letter-spacing: 1.5px;">
            <a href="{% url 'home' %}"
                style="color: #555; text-decoration: none; margin-right: 25px; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Store</a>

            <a href="{% url 'view_cart' %}"
                style="color: #555; text-decoration: none; margin-right: 25px; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Cart</a>

            {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}"
                style="color: #555; text-decoration: none; margin-right: 25px; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Dashboard</a>

            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit"
                    style="background: none; border: none; color: #555; font-family: inherit; font-size: 1em; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; padding: 0; transition: color 0.3s;"
                    onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" style="color: #555; text-decoration: none; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="success-container">
        <h1>Thank You</h1>
        <p>Your order has been placed successfully.<br>We will process it shortly.</p>
        <a href="{% url 'home' %}" class="btn-outline">Return to Store</a>
    </div>

</body>

</html>
