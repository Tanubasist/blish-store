<!DOCTYPE html>
<html>

<head>
    <title>Checkout - Blish</title>
    <style>
        /* Minimalist Global Look */
        body {
            background-color: #FAF9F6;
            color: #333333;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
        }

        /* Checkout Container */
        .checkout-container {
            max-width: 600px;
            margin: 60px auto;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 3px;
            margin-bottom: 40px;
            color: #111;
            border-bottom: 1px solid #EFEFEF;
            padding-bottom: 20px;
            font-size: 1.8em;
            text-transform: uppercase;
        }

        /* Order Summary Box */
        .order-summary {
            background: transparent;
            border: 1px solid #EFEFEF;
            padding: 20px;
            margin-bottom: 30px;
            font-size: 1.1em;
            color: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Clean Form Styles */
        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #555;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            background: transparent;
            border: 1px solid #DDD;
            font-size: 1em;
            color: #333;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #111;
        }

        /* Submit Button */
        .btn-black {
            display: block;
            width: 100%;
            background-color: #111;
            color: #fff;
            padding: 18px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.95em;
            cursor: pointer;
            margin-top: 40px;
            transition: background-color 0.3s ease;
        }

        .btn-black:hover {
            background-color: #444;
        }
    </style>
</head>

<body>

    <nav
        style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #EFEFEF; flex-wrap: wrap; gap: 15px;">
        <div style="font-size: 1.4em; font-weight: 300; letter-spacing: 3px; color: #111;">
            <a href="{% url 'home' %}" style="text-decoration: none; color: inherit;">BLISH.</a>
        </div>

        <div style="font-size: 0.85em; text-transform: uppercase; letter-spacing: 1.5px;">
            <a href="{% url 'home' %}"
                style="color: #555; text-decoration: none; margin-right: 25px; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Store</a>

            <a href="{% url 'view_cart' %}"
                style="color: #555; text-decoration: none; margin-right: 25px; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Cart</a>

            {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}"
                style="color: #555; text-decoration: none; margin-right: 25px; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Dashboard</a>

            <form action="{% url 'logout' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button type="submit"
                    style="background: none; border: none; color: #555; font-family: inherit; font-size: 1em; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; padding: 0; transition: color 0.3s;"
                    onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" style="color: #555; text-decoration: none; transition: color 0.3s;"
                onmouseover="this.style.color='#000'" onmouseout="this.style.color='#555'">Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="checkout-container">
        <h1>Checkout</h1>

        <div class="order-summary">
            <span style="font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; color: #777;">Amount to
                Pay</span>
            <span>₹{{ total_price }}</span>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="address">Shipping Address</label>
                <input type="text" id="address" name="address" required placeholder="123 Main Street">
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" required placeholder="New Delhi">
            </div>

            <button type="submit" class="btn-black">Place Order</button>
        </form>
    </div>

</body>

</html>
