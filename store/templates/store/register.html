<!DOCTYPE html>
<html>

<head>
    <title>Create Account - Discount Mart</title>
    <style>
        body {
            background-color: #F9F9F6;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 60px;
            padding-bottom: 60px;
        }

        .login-box {
            background: #FFFFFF;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
            width: 350px;
            text-align: center;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }

        ul {
            list-style: none;
            padding: 0;
            color: #d9534f;
            font-size: 0.9em;
            text-align: left;
            margin-bottom: 15px;
        }

        /* Error messages styling */
        .helptext {
            font-size: 0.8em;
            color: #666;
            display: block;
            text-align: left;
            margin-bottom: 10px;
            padding-left: 5%;
        }

        button {
            background: #222;
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background: #000;
        }

        .login-link {
            display: block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9em;
        }

        .login-link:hover {
            color: #222;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>SIGN UP</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Create Account</button>
        </form>
        <a href="{% url 'login' %}" class="login-link">Already have an account? Log in</a>
    </div>
</body>

</html>
